name: Feature request
description: Suggest an improvement for LazyDiff.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What review workflow is painful today?
      placeholder: "Example: I want to save common filters per repository."
    validations:
      required: true

  - type: textarea
    id: idea
    attributes:
      label: Proposed idea
      description: What would make LazyDiff better?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives
      description: Any simpler workaround or related tool?
