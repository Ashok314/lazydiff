name: Extension

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Test
        run: npm test

      - name: Package extension
        run: npm run zip:extension

      - name: Upload extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: lazydiff-extension
          path: release/lazydiff-extension-v*.zip
          if-no-files-found: error

      - name: Publish GitHub release artifact
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: release/lazydiff-extension-v*.zip
