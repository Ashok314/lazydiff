<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main>
      <header class="hero">
        <img class="logo" src="icons/icon-48.png" alt="" />
        <div>
          <h1>lazydiff</h1>
          <p class="tagline">Lazy enough to review.</p>
        </div>
      </header>

      <section class="panel">
        <p class="summary">Hide unwanted PR files with negative filters and see the diff size left to review.</p>
        <div class="example">
          <span>try</span>
          <code>!*.test.ts</code>
        </div>
      </section>

      <div class="features" aria-label="Core features">
        <div>
          <strong>Negative filters</strong>
          <span>Use <code>!</code> to hide paths.</span>
        </div>
        <div>
          <strong>Filtered count</strong>
          <span>See additions/deletions left.</span>
        </div>
      </div>

      <footer>
        <div>
          <span>No network</span>
          <span>Local storage only</span>
        </div>
        <nav aria-label="Links">
          <a href="https://ashok314.github.io/lazydiff/" target="_blank" rel="noreferrer">Website</a>
          <a href="https://ashok314.github.io/lazydiff/privacy/" target="_blank" rel="noreferrer">Privacy</a>
        </nav>
      </footer>
    </main>
  </body>
</html>
